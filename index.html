<!DOCTYPE html>
<html lang="en">

<head>
    <title>Temperature Converter</title>

    <style>
        body {
            background: linear-gradient(180deg, green, black);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            margin-top: 50px;
        }

        .head1 {
            color: white;
            font-size: 45px;
            font-weight: bold;
        }

        .converter-box {
            background-color: white;
            width: 350px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        img {
            width: 80px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
        }

        input,
        select {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid gray;
            font-size: 16px;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
        }

        button:hover {
            background-color: #218838;
        }

        .swap {
            background-color: #007bff;
        }

        .swap:hover {
            background-color: #0056b3;
        }

        #result {
            font-size: 22px;
            font-weight: bold;
            color: green;
            margin-top: 20px;
        }

        @media(max-width:500px) {
            .converter-box {
                width: 80%;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 class="head1">Temperature Converter</h1>

        <div class="converter-box">

            <img src="https://cdn-icons-png.flaticon.com/512/1116/1116453.png" alt="Temperature Icon">

            <label for="temp">Enter Temperature</label>

            <input type="number" id="temp" placeholder="Enter temperature value">

            <select id="fromUnit">
                <option value="celsius">Celsius</option>
                <option value="fahrenheit">Fahrenheit</option>
                <option value="kelvin">Kelvin</option>
            </select>

            <button class="swap" onclick="swapUnits()">⇄</button>

            <select id="toUnit">
                <option value="fahrenheit">Fahrenheit</option>
                <option value="celsius">Celsius</option>
                <option value="kelvin">Kelvin</option>
            </select>

            <button onclick="convertTemperature()">Convert</button>

            <p id="result"></p>

        </div>
    </div>


    <script>

        function convertTemperature() {

            var temp = parseFloat(document.getElementById("temp").value);
            var fromUnit = document.getElementById("fromUnit").value;
            var toUnit = document.getElementById("toUnit").value;
            var result;


            if (isNaN(temp)) {
                document.getElementById("result").innerHTML = "Please enter a valid temperature";
                return;
            }
            var symbol = "";
            if (fromUnit === "celsius") {

                if (toUnit === "fahrenheit") {
                    result = (temp * 9 / 5) + 32;
                    symbol = "°F";
                }
                else if (toUnit === "kelvin") {
                    result = temp + 273.15;
                    symbol = "K";
                }
                else {
                    result = temp;
                    symbol = "°C";
                }

            }


            else if (fromUnit === "fahrenheit") {

                if (toUnit === "celsius") {
                    result = (temp - 32) * 5 / 9;
                    symbol = "°C";
                }
                else if (toUnit === "kelvin") {
                    result = (temp - 32) * 5 / 9 + 273.15;
                    symbol = "K";
                }
                else {
                    result = temp;
                }

            }


            else if (fromUnit === "kelvin") {

                if (toUnit === "celsius") {
                    result = temp - 273.15;
                    symbol = "°C";
                }
                else if (toUnit === "fahrenheit") {
                    result = (temp - 273.15) * 9 / 5 + 32;
                    symbol = "°F";
                }
                else {
                    result = temp;
                }

            }


            document.getElementById("result").innerHTML =
                Number(result.toFixed(2)) + " " +
                symbol;

        }


        function swapUnits() {

            let from = document.getElementById("fromUnit");
            let to = document.getElementById("toUnit");

            let temp = from.value;

            from.value = to.value;
            to.value = temp;

        }

    </script>

</body>

</html>
